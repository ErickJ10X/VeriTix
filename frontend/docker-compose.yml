services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: veritix_frontend_dev
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
      - frontend_nuxt:/app/.nuxt
    command: >
      sh -c "bun install --frozen-lockfile && bun run dev --host 0.0.0.0 --port 3000"
    profiles:
      - dev

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: veritix_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
    profiles:
      - prod

volumes:
  frontend_node_modules:
  frontend_nuxt:
